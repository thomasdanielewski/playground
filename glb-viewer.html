<!DOCTYPE html>
<html>
<head>
  <title>GLB Viewer</title>
  <style>
    body { margin: 0; background: #08080a; }
    canvas { display: block; }
    #info { position: fixed; top: 10px; left: 10px; color: white; font: 12px monospace; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; }
    #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    button { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; cursor: pointer; font: 12px sans-serif; }
    button:hover { background: rgba(255,255,255,0.2); }
    button.active { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <div id="controls">
    <button id="btn-clay" class="active" onclick="setMode('clay')">Clay</button>
    <button id="btn-textured" onclick="setMode('textured')">Textured</button>
    <button onclick="resetCamera()">Reset Camera</button>
    <button onclick="setView('front')">Front</button>
    <button onclick="setView('side')">Side</button>
    <button onclick="setView('top')">Top</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x08080a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 2.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lighting — matching app setup
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const key = new THREE.DirectionalLight(0xffffff, 1.0);
    key.position.set(1, 1, 2);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.4);
    fill.position.set(-1, -0.5, -1);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.4);
    rim.position.set(0, 0, -2);
    scene.add(rim);

    let meshObj = null;
    let originalMaterial = null;
    let clayMaterial = null;
    let mode = 'clay';

    const loader = new GLTFLoader();
    // The GLB file path — served from vite
    loader.load('/mesh.glb', (gltf) => {
      meshObj = gltf.scene;

      // Collect stats
      let triCount = 0;
      let vertCount = 0;
      meshObj.traverse(child => {
        if (child.isMesh) {
          const geo = child.geometry;
          vertCount += (geo.attributes.position?.count || 0);
          triCount += (geo.index ? geo.index.count / 3 : geo.attributes.position.count / 3);
          originalMaterial = child.material;
          clayMaterial = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 1.0, metalness: 0.0 });
          child.material = clayMaterial;
        }
      });

      // Center
      const box = new THREE.Box3().setFromObject(meshObj);
      const center = new THREE.Vector3();
      box.getCenter(center);
      meshObj.position.sub(center);

      // Fit camera
      const size = box.getSize(new THREE.Vector3()).length();
      camera.position.set(0, 0, size * 1.2);
      controls.target.set(0, 0, 0);

      scene.add(meshObj);
      document.getElementById('info').textContent =
        `Vertices: ${vertCount.toLocaleString()} | Triangles: ${Math.round(triCount).toLocaleString()}`;
    }, undefined, (err) => {
      document.getElementById('info').textContent = 'Error: ' + err.message;
      console.error(err);
    });

    window.setMode = function(m) {
      mode = m;
      document.getElementById('btn-clay').className = m === 'clay' ? 'active' : '';
      document.getElementById('btn-textured').className = m === 'textured' ? 'active' : '';
      if (!meshObj) return;
      meshObj.traverse(child => {
        if (child.isMesh) {
          child.material = m === 'clay' ? clayMaterial : originalMaterial;
        }
      });
    };

    window.resetCamera = function() {
      if (!meshObj) return;
      const box = new THREE.Box3().setFromObject(meshObj);
      const size = box.getSize(new THREE.Vector3()).length();
      camera.position.set(0, 0, size * 1.2);
      controls.target.set(0, 0, 0);
    };

    window.setView = function(v) {
      if (!meshObj) return;
      const box = new THREE.Box3().setFromObject(meshObj);
      const size = box.getSize(new THREE.Vector3()).length();
      if (v === 'front') camera.position.set(0, 0, size * 1.2);
      if (v === 'side') camera.position.set(size * 1.2, 0, 0);
      if (v === 'top') camera.position.set(0, size * 1.2, 0);
      controls.target.set(0, 0, 0);
      controls.update();
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
